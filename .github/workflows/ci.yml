name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install templ (pinned to go.mod)
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020

      - name: Generate templ components
        run: templ generate

      - name: Verify generated *_templ.go is committed
        run: |
          if ! git diff --quiet -- '*_templ.go'; then
            echo "Generated templ output is stale - run 'templ generate' and commit:"
            git diff --stat -- '*_templ.go'
            exit 1
          fi

      - name: gofmt
        run: |
          files=$(git ls-files '*.go' | grep -vE '^vendor/|_templ\.go$')
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet -mod=vendor ./...

      - name: go test
        run: go test -mod=vendor ./...

      - name: Build (native)
        run: go build -mod=vendor .

      - name: Cross-compile (Raspberry Pi arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -mod=vendor -o ggo-kea-dhcp-arm64 .

      - name: Shellcheck packaging scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S error install.sh packaging/scripts/*.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install templ (pinned to go.mod)
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020

      - name: Generate templ components
        run: templ generate

      # Install golangci-lint via `go install` rather than golangci-lint-action so
      # it is BUILT WITH the CI Go toolchain (from go.mod). The action ships a
      # prebuilt binary built with an older Go, which refuses to analyse a module
      # whose go directive is newer ("go language version used to build
      # golangci-lint is lower than the targeted Go version").
      - name: Install golangci-lint (v2, built with the CI Go)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: golangci-lint
        run: golangci-lint run
